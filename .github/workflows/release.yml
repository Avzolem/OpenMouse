name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller
      - name: Build
        working-directory: server
        run: pyinstaller openmouse.spec
      - name: Rename
        run: mv server/dist/openmouse server/dist/openmouse-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: openmouse-linux-x86_64
          path: server/dist/openmouse-linux-x86_64

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller
      - name: Build
        working-directory: server
        run: pyinstaller openmouse.spec
      - name: Rename
        run: mv server/dist/openmouse server/dist/openmouse-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: openmouse-linux-aarch64
          path: server/dist/openmouse-linux-aarch64

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller
      - name: Build
        working-directory: server
        run: pyinstaller openmouse.spec
      - name: Rename
        run: mv server/dist/openmouse.exe server/dist/openmouse-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: openmouse-windows-x86_64
          path: server/dist/openmouse-windows-x86_64.exe

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See README for setup steps." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/android/app/openmouse-release.jks
      - name: Write key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > app/android/key.properties <<EOF
          storeFile=openmouse-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get
      - name: Build APK
        working-directory: app
        run: flutter build apk --release
      - name: Rename
        run: mv app/build/app/outputs/flutter-apk/app-release.apk openmouse-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: openmouse-android
          path: openmouse-android.apk

  release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-windows-x86_64, build-android-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openmouse-linux-x86_64
            dist/openmouse-linux-aarch64
            dist/openmouse-windows-x86_64.exe
            dist/openmouse-android.apk
          generate_release_notes: true
